server {
    listen 80;
    server_name api.fusional.dev;

    # Root path for static frontend
    root /var/www/fusional;
    index index.html;

    # Helps with "Invalid host header" issues
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # FusionAL API routes
    location /fusional/ {
        proxy_pass http://localhost:8009/;
    }

    location /health {
        proxy_pass http://localhost:8009/health;
    }

    # Other service API routes
    location /bi/ {
        proxy_pass http://localhost:8101/;
    }

    location /api/ {
        proxy_pass http://localhost:8102/;
    }

    location /content/ {
        proxy_pass http://localhost:8103/;
    }

    location /intel/ {
        proxy_pass http://localhost:8104/;
    }

    # Serve static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
