server {
    listen 8080;
    server_name _;

    client_max_body_size 2m;

    auth_basic "FusionAL MCP";
    auth_basic_user_file /etc/nginx/.htpasswd;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /bi/ {
        proxy_pass http://business-intelligence-mcp:8101/mcp/;
    }

    location /api/ {
        proxy_pass http://api-integration-hub:8102/mcp/;
    }

    location /content/ {
        proxy_pass http://content-automation-mcp:8103/mcp/;
    }

    location /intel/ {
        proxy_pass http://intelligence-mcp:8104/mcp/;
    }
}
