events {}
http {
  server {
    listen 80;

    location /fusional/ {
      proxy_pass http://fusional-fusional-1:8009/;
      proxy_set_header Host $host;
    }
    location /bi/ {
      proxy_pass http://business-intelligence-mcp:8101/;
      proxy_set_header Host $host;
    }
    location /api/ {
      proxy_pass http://api-integration-hub:8102/;
      proxy_set_header Host $host;
    }
    location /content/ {
      proxy_pass http://content-automation-mcp:8103/;
      proxy_set_header Host $host;
    }
    location /intel/ {
      proxy_pass http://intelligence-mcp:8104/;
      proxy_set_header Host $host;
    }
  }
}