services:
  nginx:
    image: nginx:alpine
    container_name: fusional-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - api-integration-hub
      - business-intelligence-mcp
      - content-automation-mcp
      - intelligence-mcp